name: AI Inventory Forecast

on:
  workflow_dispatch:

  schedule:
    - cron: "0 2 * * *"

jobs:
  forecast:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: inventory-ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Engine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_MODE: production
          LARAVEL_URL: https://shop-inventory-forecasting.onrender.com
        run: |
          python run_forecast.py
